version: '3.8'

# 网络配置
networks:
  app-network:
    driver: bridge
    ipam:
      driver: default

# 数据卷配置
volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local

# 服务配置
services:
  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-job-helper
    ports:
      - "8501:8501"
    volumes:
      - app_data:/app/data
    environment:
      - GLM4_API_KEY=${GLM4_API_KEY}
      - DATABASE_URL=mysql+pymysql://job_helper:password@mysql:3306/job_helper
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=job-helper
      - ENVIRONMENT=production
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: ai-job-helper-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=job_helper
      - MYSQL_USER=job_helper
      - MYSQL_PASSWORD=password
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: ai-job-helper-redis
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command:
      - redis-server
      - --appendonly yes
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru

  # MinIO对象存储服务
  minio:
    image: minio/minio:latest
    container_name: ai-job-helper-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  # MinIO初始化服务（创建bucket）
  minio-init:
    image: minio/mc:latest
    container_name: ai-job-helper-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/job-helper --ignore-existing;
      mc policy set public myminio/job-helper;
      exit 0;
      "

  # 开发环境
  development:
    extends:
      service: app
    container_name: ai-job-helper-dev
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - DATABASE_URL=sqlite:///job_helper.db
    volumes:
      - .:/app
      - app_data:/app/data
    ports:
      - "8502:8501"
    profiles:
      - development
    depends_on: []

  # 测试环境
  test:
    extends:
      service: app
    container_name: ai-job-helper-test
    environment:
      - ENVIRONMENT=test
      - DEBUG=False
      - DATABASE_URL=sqlite:///test_job_helper.db
    volumes:
      - .:/app
    ports:
      - "8503:8501"
    profiles:
      - test
    depends_on: []

  # 生产环境
  production:
    extends:
      service: app
    container_name: ai-job-helper-prod
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    profiles:
      - production
