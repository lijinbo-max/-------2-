version: '3'

# 基础配置
services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - GLM4_API_KEY=${GLM4_API_KEY}
    restart: unless-stopped

# 开发环境
development:
  extends:
    service: app
  environment:
    - ENVIRONMENT=development
    - DEBUG=True

# 测试环境
test:
  extends:
    service: app
  environment:
    - ENVIRONMENT=test
    - DEBUG=False

# 生产环境
production:
  extends:
    service: app
  environment:
    - ENVIRONMENT=production
    - DEBUG=False
  restart: always
