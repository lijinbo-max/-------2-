name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Lint check
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Test
        run: |
          if [ -f tests/run_tests.py ]; then python tests/run_tests.py; fi
      
      - name: Deploy to Streamlit Cloud
        run: |
          echo "Deployment to Streamlit Cloud triggered"
          echo "Streamlit Cloud automatically deploys changes from the main branch"
          echo "Deployment URL: https://empowered-by-technology-epkz76rmbhk5ccwflhtxla.streamlit.app/"
