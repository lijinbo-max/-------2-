name: Deploy to Streamlit Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify deployment
        run: |
          echo "Deployment to Streamlit Cloud is automatically handled"
          echo "Streamlit Cloud monitors the main branch for changes"
          echo "Deployment URL: https://empowered-by-technology-epkz76rmbhk5ccwflhtxla.streamlit.app/"
          echo "Workflow completed successfully!"
